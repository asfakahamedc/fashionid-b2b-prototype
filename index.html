    <!-- FAQ Schema for AEO (Google People Also Ask) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the standard MOQ for garment manufacturing in Bangladesh?",
          "acceptedAnswer": { "@type": "Answer", "text": "Standard MOQs vary by garment type: 3,000 pieces for denim, 1,000 pieces for knitwear (t-shirts, polos), and 2,000 pieces for woven garments. FashionID offers reduced MOQs of 300-500 pieces for new brand sample development at adjusted unit pricing." }
        },
        {
          "@type": "Question",
          "name": "How long does shipping take from Chittagong port to Europe?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sea freight from Chittagong port to major European ports (Rotterdam, Hamburg, Felixstowe) typically takes 25-35 days. Door-to-door including customs clearance averages 35-45 days. Air freight reduces transit to 5-7 days." }
        },
        {
          "@type": "Question",
          "name": "How do I start a production run with a Bangladeshi factory?",
          "acceptedAnswer": { "@type": "Answer", "text": "Submit your tech pack and MOQ requirements through our RFQ form. Our team responds within 24 hours with a feasibility assessment, indicative pricing, and production timeline. After approving a pre-production sample, bulk production begins with a 60-120 day ex-factory window." }
        },
        {
          "@type": "Question",
          "name": "What quality control standards does FashionID enforce?",
          "acceptedAnswer": { "@type": "Answer", "text": "All production runs are subject to AQL 2.5 inspection standards. We conduct inline inspections, pre-shipment final random inspections, and optional third-party audits through SGS, Bureau Veritas, or Intertek." }
        },
        {
          "@type": "Question",
          "name": "Does FashionID protect my brand's intellectual property?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. All tech packs, CADs, and brand assets are protected under our strict NDA framework. We bind all partner factories to the same confidentiality terms and prohibit unauthorized overruns or B-grade stock sales." }
        }
      ]
    }
    </script>
